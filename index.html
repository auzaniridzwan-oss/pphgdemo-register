<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braze Platform Demonstration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/a21f98a3f6.js" crossorigin="anonymous" defer></script>
  <link rel="stylesheet" href="./css/registration.css" />
  <script type="importmap">
  {
    "imports": {
      "ky": "https://esm.sh/ky@1.7.4"
    }
  }
  </script>
  <script>
    window.__APP_CONFIG__ = window.__APP_CONFIG__ || {
      BRAZE_REST_ENDPOINT: ''
    };
  </script>
</head>
<body>
  <div id="toast-container" class="reg-toast-container" aria-live="polite"></div>

  <div id="registration-root" class="reg-root">
    <div class="reg-device-frame">
      <header id="registration-header" class="reg-header" role="banner">
        <img
          src="./images/pphg_logo_sq.png"
          alt="Pan Pacific Hotel Group"
          width="48"
          height="48"
          class="reg-header-logo"
        />
        <div class="reg-header-titles">
          <span class="reg-header-eyebrow">Braze Platform Demonstration</span>
        </div>
      </header>

      <main id="registration-outlet" class="reg-outlet" role="main"></main>

      <footer id="registration-footer" class="reg-footer" role="contentinfo">
        <p class="reg-footer-text">
          This demo is confidential. Information collected for this session may be removed when the session ends.
        </p>
      </footer>
    </div>
  </div>

  <script type="module" src="./js/register-main.js"></script>
</body>
</html>
